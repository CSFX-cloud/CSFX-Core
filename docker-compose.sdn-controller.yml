x-rust-common: &rust-common
  build:
    context: .
    dockerfile: control-plane/Dockerfile.dev.shared
  volumes:
    - ./control-plane/shared:/app/control-plane/shared
    - ./Cargo.toml:/app/Cargo.toml
    - ./Cargo.lock:/app/Cargo.lock
    - cargo_cache:/usr/local/cargo/registry
    - cargo_git:/usr/local/cargo/git
  networks:
    - csfx-network
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    container_name: csfx-postgres-sdn
    environment:
      POSTGRES_USER: csfx_user
      POSTGRES_PASSWORD: csfx_password
      POSTGRES_DB: csfx_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csfx_user -d csfx_core"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - csfx-network

  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.21
    container_name: csfx-etcd-sdn
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
    ports:
      - "2379:2379"
    networks:
      - csfx-network

  api-gateway:
    <<: *rust-common
    container_name: csfx-api-gateway-sdn
    environment:
      DATABASE_URL: postgres://csfx_user:csfx_password@postgres:5432/csfx_core
      RUST_LOG: debug
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RSA_KEY_SIZE: "2048"
      REGISTRY_SERVICE_URL: http://registry:8001
      SCHEDULER_SERVICE_URL: http://scheduler:8002
      VOLUME_MANAGER_URL: http://volume-manager:8003
      FAILOVER_CONTROLLER_URL: http://failover-controller:8004
      SDN_CONTROLLER_URL: http://sdn-controller:8005
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./control-plane/api-gateway:/app/control-plane/api-gateway
      - ./control-plane/shared:/app/control-plane/shared
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo_cache:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - cargo_target_api_gateway:/app/target
    command: cargo watch -x "run -p api-gateway"

  registry:
    <<: *rust-common
    container_name: csfx-registry-sdn
    environment:
      DATABASE_URL: postgres://csfx_user:csfx_password@postgres:5432/csfx_core
      ETCD_ENDPOINTS: http://etcd:2379
      REGISTRY_PORT: "8001"
      RUST_LOG: debug
      SCHEDULER_SERVICE_URL: http://scheduler:8002
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      etcd:
        condition: service_started
    volumes:
      - ./control-plane/registry:/app/control-plane/registry
      - ./control-plane/shared:/app/control-plane/shared
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo_cache:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - cargo_target_registry:/app/target
    command: cargo watch -x "run -p registry"

  scheduler:
    <<: *rust-common
    container_name: csfx-scheduler-sdn
    environment:
      DATABASE_URL: postgres://csfx_user:csfx_password@postgres:5432/csfx_core
      ETCD_ENDPOINTS: http://etcd:2379
      SCHEDULER_PORT: "8002"
      RUST_LOG: debug
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      etcd:
        condition: service_started
    volumes:
      - ./control-plane/scheduler:/app/control-plane/scheduler
      - ./control-plane/shared:/app/control-plane/shared
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo_cache:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - cargo_target_scheduler:/app/target
    command: cargo watch -x "run -p scheduler"

  volume-manager:
    <<: *rust-common
    container_name: csfx-volume-manager-sdn
    environment:
      DATABASE_URL: postgres://csfx_user:csfx_password@postgres:5432/csfx_core
      ETCD_ENDPOINTS: http://etcd:2379
      VOLUME_MANAGER_PORT: "8003"
      RUST_LOG: debug
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      etcd:
        condition: service_started
    volumes:
      - ./control-plane/volume-manager:/app/control-plane/volume-manager
      - ./control-plane/shared:/app/control-plane/shared
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo_cache:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - cargo_target_volume_manager:/app/target
    command: cargo watch -x "run -p volume-manager"

  failover-controller:
    <<: *rust-common
    container_name: csfx-failover-controller-sdn
    environment:
      DATABASE_URL: postgres://csfx_user:csfx_password@postgres:5432/csfx_core
      FAILOVER_CONTROLLER_PORT: "8004"
      SCHEDULER_SERVICE_URL: http://scheduler:8002
      VOLUME_MANAGER_URL: http://volume-manager:8003
      RUST_LOG: debug
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      scheduler:
        condition: service_started
      volume-manager:
        condition: service_started
    volumes:
      - ./control-plane/failover-controller:/app/control-plane/failover-controller
      - ./control-plane/shared:/app/control-plane/shared
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo_cache:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - cargo_target_failover_controller:/app/target
    command: cargo watch -x "run -p failover-controller"

  sdn-controller:
    <<: *rust-common
    container_name: csfx-sdn-controller
    environment:
      DATABASE_URL: postgres://csfx_user:csfx_password@postgres:5432/csfx_core
      ETCD_URL: http://etcd:2379
      SDN_CONTROLLER_PORT: "8005"
      RUST_LOG: debug
    ports:
      - "8005:8005"
    depends_on:
      postgres:
        condition: service_healthy
      etcd:
        condition: service_started
    volumes:
      - ./control-plane/sdn-controller:/app/control-plane/sdn-controller
      - ./control-plane/shared:/app/control-plane/shared
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo_cache:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - cargo_target_sdn_controller:/app/target
    command: cargo watch -x "run -p sdn-controller"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  cargo_cache:
    driver: local
  cargo_git:
    driver: local
  cargo_target_api_gateway:
    driver: local
  cargo_target_registry:
    driver: local
  cargo_target_scheduler:
    driver: local
  cargo_target_volume_manager:
    driver: local
  cargo_target_failover_controller:
    driver: local
  cargo_target_sdn_controller:
    driver: local

networks:
  csfx-network:
    driver: bridge
