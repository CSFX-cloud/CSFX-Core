services:
  # ========================================
  # CEPH CLUSTER (3 MONs + 3 OSDs + 3 MGRs)
  # ========================================
  
  ceph-mon1:
    image: ceph/daemon:latest-pacific
    container_name: ceph-mon1
    hostname: ceph-mon1
    environment:
      - CEPH_DAEMON=mon
      - MON_IP=172.20.0.21
      - CEPH_PUBLIC_NETWORK=172.20.0.0/16
      - CLUSTER=ceph
      - CEPH_CLUSTER_NETWORK=172.20.0.0/16
      - DEMO_DAEMONS=mon
      - NETWORK_AUTO_DETECT=4
      - CEPH_AUTH_REQUIRE_SIGNATURES=false
    volumes:
      - ceph-mon1-data:/var/lib/ceph
      - ./ceph-config/ceph.conf:/etc/ceph/ceph.conf:ro
    networks:
      csfx-test:
        ipv4_address: 172.20.0.21
    cap_add:
      - ALL
    privileged: true
    healthcheck:
      test: ["CMD", "ceph", "health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  ceph-mon2:
    image: ceph/daemon:latest-pacific
    container_name: ceph-mon2
    hostname: ceph-mon2
    environment:
      - CEPH_DAEMON=mon
      - MON_IP=172.20.0.22
      - CEPH_PUBLIC_NETWORK=172.20.0.0/16
      - CLUSTER=ceph
      - CEPH_CLUSTER_NETWORK=172.20.0.0/16
      - CLOBBER=true
      - NETWORK_AUTO_DETECT=4
      - CEPH_AUTH_REQUIRE_SIGNATURES=false
    volumes:
      - ceph-mon2-data:/var/lib/ceph
      - ./ceph-config/ceph.conf:/etc/ceph/ceph.conf:ro
    networks:
      csfx-test:
        ipv4_address: 172.20.0.22
    cap_add:
      - ALL
    privileged: true
    healthcheck:
      test: ["CMD", "ceph", "health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    depends_on:
      - ceph-mon1

  ceph-mon3:
    image: ceph/daemon:latest-pacific
    container_name: ceph-mon3
    hostname: ceph-mon3
    environment:
      - CEPH_DAEMON=mon
      - MON_IP=172.20.0.23
      - CEPH_PUBLIC_NETWORK=172.20.0.0/16
      - CLUSTER=ceph
      - CEPH_CLUSTER_NETWORK=172.20.0.0/16
      - CLOBBER=true
      - NETWORK_AUTO_DETECT=4
      - CEPH_AUTH_REQUIRE_SIGNATURES=false
    volumes:
      - ceph-mon3-data:/var/lib/ceph
      - ./ceph-config/ceph.conf:/etc/ceph/ceph.conf:ro
    networks:
      csfx-test:
        ipv4_address: 172.20.0.23
    cap_add:
      - ALL
    privileged: true
    healthcheck:
      test: ["CMD", "ceph", "health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    depends_on:
      - ceph-mon1

  ceph-osd1:
    image: ceph/daemon:latest-pacific
    container_name: ceph-osd1
    hostname: ceph-osd1
    environment:
      - CEPH_DAEMON=osd
      - OSD_TYPE=directory
      - CEPH_PUBLIC_NETWORK=172.20.0.0/16
      - CLUSTER=ceph
      - NETWORK_AUTO_DETECT=4
      - CEPH_AUTH_REQUIRE_SIGNATURES=false
    volumes:
      - ceph-osd1-data:/var/lib/ceph/osd
      - ./ceph-config/ceph.conf:/etc/ceph/ceph.conf:ro
    networks:
      csfx-test:
        ipv4_address: 172.20.0.31
    cap_add:
      - ALL
    privileged: true
    restart: unless-stopped
    depends_on:
      - ceph-mon1
      - ceph-mon2
      - ceph-mon3

  ceph-osd2:
    image: ceph/daemon:latest-pacific
    container_name: ceph-osd2
    hostname: ceph-osd2
    environment:
      - CEPH_DAEMON=osd
      - OSD_TYPE=directory
      - CEPH_PUBLIC_NETWORK=172.20.0.0/16
      - CLUSTER=ceph
      - NETWORK_AUTO_DETECT=4
      - CEPH_AUTH_REQUIRE_SIGNATURES=false
    volumes:
      - ceph-osd2-data:/var/lib/ceph/osd
      - ./ceph-config/ceph.conf:/etc/ceph/ceph.conf:ro
    networks:
      csfx-test:
        ipv4_address: 172.20.0.32
    cap_add:
      - ALL
    privileged: true
    restart: unless-stopped
    depends_on:
      - ceph-mon1
      - ceph-mon2
      - ceph-mon3

  ceph-osd3:
    image: ceph/daemon:latest-pacific
    container_name: ceph-osd3
    hostname: ceph-osd3
    environment:
      - CEPH_DAEMON=osd
      - OSD_TYPE=directory
      - CEPH_PUBLIC_NETWORK=172.20.0.0/16
      - CLUSTER=ceph
      - NETWORK_AUTO_DETECT=4
      - CEPH_AUTH_REQUIRE_SIGNATURES=false
    volumes:
      - ceph-osd3-data:/var/lib/ceph/osd
      - ./ceph-config/ceph.conf:/etc/ceph/ceph.conf:ro
    networks:
      csfx-test:
        ipv4_address: 172.20.0.33
    cap_add:
      - ALL
    privileged: true
    restart: unless-stopped
    depends_on:
      - ceph-mon1
      - ceph-mon2
      - ceph-mon3

  # ========================================
  # ETCD CLUSTER (für State & Patroni)
  # ========================================
  
  etcd1:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: etcd1
    hostname: etcd1
    environment:
      - ETCD_NAME=etcd1
      - ETCD_ENABLE_V2=true
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd1:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd1:2379
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster-csfx
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
    ports:
      - "2379:2379"
      - "2380:2380"
    networks:
      csfx-test:
        ipv4_address: 172.20.0.11
    volumes:
      - etcd1-data:/etcd-data
    restart: unless-stopped

  etcd2:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: etcd2
    hostname: etcd2
    environment:
      - ETCD_NAME=etcd2
      - ETCD_ENABLE_V2=true
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd2:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd2:2379
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster-csfx
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
    ports:
      - "2479:2379"
      - "2480:2380"
    networks:
      csfx-test:
        ipv4_address: 172.20.0.12
    volumes:
      - etcd2-data:/etcd-data
    restart: unless-stopped

  etcd3:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: etcd3
    hostname: etcd3
    environment:
      - ETCD_ENABLE_V2=true
      - ETCD_NAME=etcd3
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd3:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd3:2379
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster-csfx
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
    ports:
      - "2579:2379"
      - "2580:2380"
    networks:
      csfx-test:
        ipv4_address: 172.20.0.13
    volumes:
      - etcd3-data:/etcd-data
    restart: unless-stopped

  # ========================================
  # PATRONI POSTGRESQL HA CLUSTER
  # ========================================
  
  patroni1:
    image: ghcr.io/zalando/spilo-15:3.0-p1
    container_name: patroni1
    hostname: patroni1
    environment:
      - PATRONI_NAME=patroni1
      - ETCD_HOST=etcd1:2379
      - PATRONI_SCOPE=postgres-csfxx
      - PATRONI_ETCD3_HOSTS=etcd1:2379,etcd2:2379,etcd3:2379
      - PATRONI_ETCD3_PROTOCOL=http
      
      # PostgreSQL Configuration
      - PATRONI_POSTGRESQL_DATA_DIR=/home/postgres/pgdata
      - PATRONI_POSTGRESQL_LISTEN=0.0.0.0:5432
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=patroni1:5432
      
      # Replication
      - PATRONI_REPLICATION_USERNAME=replicator
      - PATRONI_REPLICATION_PASSWORD=replpass
      
      # Superuser
      - PATRONI_SUPERUSER_USERNAME=postgres
      - PATRONI_SUPERUSER_PASSWORD=postgrespass
      
      # Application User
      - PATRONI_POSTGRESQL_PGPASS=/tmp/pgpass
      - POSTGRES_USER=csfx
      - POSTGRES_PASSWORD=csfxpassword
      - POSTGRES_DB=csfx_core
      
      # REST API
      - PATRONI_RESTAPI_LISTEN=0.0.0.0:8008
      - PATRONI_RESTAPI_CONNECT_ADDRESS=patroni1:8008
      
      # Bootstrap
      - PATRONI_BOOTSTRAP_DCS_TTL=30
      - PATRONI_BOOTSTRAP_DCS_LOOP_WAIT=10
      - PATRONI_BOOTSTRAP_DCS_RETRY_TIMEOUT=10
      - PATRONI_BOOTSTRAP_METHOD=initdb
      
      # PostgreSQL parameters
      - PATRONI_POSTGRESQL_PARAMETERS_MAX_CONNECTIONS=100
      - PATRONI_POSTGRESQL_PARAMETERS_MAX_WAL_SENDERS=10
      - PATRONI_POSTGRESQL_PARAMETERS_WAL_LEVEL=replica
      - PATRONI_POSTGRESQL_PARAMETERS_HOT_STANDBY=on
      - PATRONI_POSTGRESQL_PARAMETERS_WAL_KEEP_SIZE=128MB
      - PATRONI_POSTGRESQL_PARAMETERS_ARCHIVE_MODE=on
      - PATRONI_POSTGRESQL_PARAMETERS_ARCHIVE_COMMAND=/bin/true
      
    volumes:
      - patroni1-data:/home/postgres/pgdata
    networks:
      csfx-test:
        ipv4_address: 172.20.0.41
    ports:
      - "5441:5432"
      - "8008:8008"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8008/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      - etcd1
      - etcd2
      - etcd3
      - ceph-osd1
      - ceph-osd2
      - ceph-osd3
    restart: unless-stopped

  patroni2:
    image: ghcr.io/zalando/spilo-15:3.0-p1
    container_name: patroni2
    hostname: patroni2
    environment:
      - ETCD_HOST=etcd1:2379
      - PATRONI_NAME=patroni2
      - PATRONI_SCOPE=postgres-csfxx
      - PATRONI_ETCD3_HOSTS=etcd1:2379,etcd2:2379,etcd3:2379
      - PATRONI_ETCD3_PROTOCOL=http
      
      - PATRONI_POSTGRESQL_DATA_DIR=/home/postgres/pgdata
      - PATRONI_POSTGRESQL_LISTEN=0.0.0.0:5432
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=patroni2:5432
      
      - PATRONI_REPLICATION_USERNAME=replicator
      - PATRONI_REPLICATION_PASSWORD=replpass
      
      - PATRONI_SUPERUSER_USERNAME=postgres
      - PATRONI_SUPERUSER_PASSWORD=postgrespass
      
      - PATRONI_POSTGRESQL_PGPASS=/tmp/pgpass
      - POSTGRES_USER=csfx
      - POSTGRES_PASSWORD=csfxpassword
      - POSTGRES_DB=csfx_core
      
      - PATRONI_RESTAPI_LISTEN=0.0.0.0:8008
      - PATRONI_RESTAPI_CONNECT_ADDRESS=patroni2:8008
      
      - PATRONI_BOOTSTRAP_DCS_TTL=30
      - PATRONI_BOOTSTRAP_DCS_LOOP_WAIT=10
      - PATRONI_BOOTSTRAP_DCS_RETRY_TIMEOUT=10
      - PATRONI_BOOTSTRAP_METHOD=initdb
      
      - PATRONI_POSTGRESQL_PARAMETERS_MAX_CONNECTIONS=100
      - PATRONI_POSTGRESQL_PARAMETERS_MAX_WAL_SENDERS=10
      - PATRONI_POSTGRESQL_PARAMETERS_WAL_LEVEL=replica
      - PATRONI_POSTGRESQL_PARAMETERS_HOT_STANDBY=on
      - PATRONI_POSTGRESQL_PARAMETERS_WAL_KEEP_SIZE=128MB
      - PATRONI_POSTGRESQL_PARAMETERS_ARCHIVE_MODE=on
      - PATRONI_POSTGRESQL_PARAMETERS_ARCHIVE_COMMAND=/bin/true
      
    volumes:
      - patroni2-data:/home/postgres/pgdata
    networks:
      csfx-test:
        ipv4_address: 172.20.0.42
    ports:
      - "5442:5432"
      - "8009:8008"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8008/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      - etcd1
      - etcd2
      - etcd3
      - ceph-osd1
      - ceph-osd2
      - ceph-osd3
    restart: unless-stopped

  patroni3:
    image: ghcr.io/zalando/spilo-15:3.0-p1
    container_name: patroni3
    hostname: patroni3
    environment:
      - ETCD_HOST=etcd1:2379
      - PATRONI_NAME=patroni3
      - PATRONI_SCOPE=postgres-csfxx
      - PATRONI_ETCD3_HOSTS=etcd1:2379,etcd2:2379,etcd3:2379
      - PATRONI_ETCD3_PROTOCOL=http
      
      - PATRONI_POSTGRESQL_DATA_DIR=/home/postgres/pgdata
      - PATRONI_POSTGRESQL_LISTEN=0.0.0.0:5432
      - PATRONI_POSTGRESQL_CONNECT_ADDRESS=patroni3:5432
      
      - PATRONI_REPLICATION_USERNAME=replicator
      - PATRONI_REPLICATION_PASSWORD=replpass
      
      - PATRONI_SUPERUSER_USERNAME=postgres
      - PATRONI_SUPERUSER_PASSWORD=postgrespass
      
      - PATRONI_POSTGRESQL_PGPASS=/tmp/pgpass
      - POSTGRES_USER=csfx
      - POSTGRES_PASSWORD=csfxpassword
      - POSTGRES_DB=csfx_core
      
      - PATRONI_RESTAPI_LISTEN=0.0.0.0:8008
      - PATRONI_RESTAPI_CONNECT_ADDRESS=patroni3:8008
      
      - PATRONI_BOOTSTRAP_DCS_TTL=30
      - PATRONI_BOOTSTRAP_DCS_LOOP_WAIT=10
      - PATRONI_BOOTSTRAP_DCS_RETRY_TIMEOUT=10
      - PATRONI_BOOTSTRAP_METHOD=initdb
      
      - PATRONI_POSTGRESQL_PARAMETERS_MAX_CONNECTIONS=100
      - PATRONI_POSTGRESQL_PARAMETERS_MAX_WAL_SENDERS=10
      - PATRONI_POSTGRESQL_PARAMETERS_WAL_LEVEL=replica
      - PATRONI_POSTGRESQL_PARAMETERS_HOT_STANDBY=on
      - PATRONI_POSTGRESQL_PARAMETERS_WAL_KEEP_SIZE=128MB
      - PATRONI_POSTGRESQL_PARAMETERS_ARCHIVE_MODE=on
      - PATRONI_POSTGRESQL_PARAMETERS_ARCHIVE_COMMAND=/bin/true
      
    volumes:
      - patroni3-data:/home/postgres/pgdata
    networks:
      csfx-test:
        ipv4_address: 172.20.0.43
    ports:
      - "5443:5432"
      - "8010:8008"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8008/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      - etcd1
      - etcd2
      - etcd3
      - ceph-osd1
      - ceph-osd2
      - ceph-osd3
    restart: unless-stopped

  # ========================================
  # HAPROXY (Smart Routing: Primary/Replica)
  # ========================================
  
  postgres-haproxy:
    image: haproxy:2.8-alpine
    container_name: postgres-haproxy
    volumes:
      - ./haproxy-patroni.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5432:5432"   # Write Port (Primary)
      - "5433:5433"   # Read Port (Replicas)
      - "8000:8000"   # HAProxy Stats
    networks:
      csfx-test:
        ipv4_address: 172.20.0.40
    depends_on:
      - patroni1
      - patroni2
      - patroni3
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8000/stats || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ========================================
  # VOLUME MANAGER (mit Patroni-Integration)
  # ========================================
  
  volume-manager-1:
    image: volume-manager:patroni
    build:
      context: ../..
      dockerfile: control-plane/volume-manager/Dockerfile.test
    container_name: volume-manager-1
    hostname: volume-manager-1
    environment:
      - RUST_LOG=info
      - ETCD_ENDPOINTS=http://etcd1:2379,http://etcd2:2379,http://etcd3:2379
      - NODE_ID=vm-1
      - CEPH_MON_HOSTS=ceph-mon1:6789,ceph-mon2:6789,ceph-mon3:6789
      - CEPH_DEFAULT_POOL=csfx-data
      - CEPH_PG_NUM=128
      - CEPH_DEFAULT_REPLICATION=3
      - PATRONI_SCOPE=postgres-csfxx
      - PATRONI_NODES=patroni1:8008,patroni2:8008,patroni3:8008
    networks:
      csfx-test:
        ipv4_address: 172.20.0.51
    depends_on:
      - etcd1
      - etcd2
      - etcd3
      - ceph-mon1
      - ceph-mon2
      - ceph-mon3
      - patroni1
      - patroni2
      - patroni3
    restart: unless-stopped

  volume-manager-2:
    image: volume-manager:patroni
    build:
      context: ../..
      dockerfile: control-plane/volume-manager/Dockerfile.test
    container_name: volume-manager-2
    hostname: volume-manager-2
    environment:
      - RUST_LOG=info
      - ETCD_ENDPOINTS=http://etcd1:2379,http://etcd2:2379,http://etcd3:2379
      - NODE_ID=vm-2
      - CEPH_MON_HOSTS=ceph-mon1:6789,ceph-mon2:6789,ceph-mon3:6789
      - CEPH_DEFAULT_POOL=csfx-data
      - CEPH_PG_NUM=128
      - CEPH_DEFAULT_REPLICATION=3
      - PATRONI_SCOPE=postgres-csfxx
      - PATRONI_NODES=patroni1:8008,patroni2:8008,patroni3:8008
    networks:
      csfx-test:
        ipv4_address: 172.20.0.52
    depends_on:
      - etcd1
      - etcd2
      - etcd3
      - ceph-mon1
      - ceph-mon2
      - ceph-mon3
      - patroni1
      - patroni2
      - patroni3
    restart: unless-stopped

  volume-manager-3:
    image: volume-manager:patroni
    build:
      context: ../..
      dockerfile: control-plane/volume-manager/Dockerfile.test
    container_name: volume-manager-3
    hostname: volume-manager-3
    environment:
      - RUST_LOG=info
      - ETCD_ENDPOINTS=http://etcd1:2379,http://etcd2:2379,http://etcd3:2379
      - NODE_ID=vm-3
      - CEPH_MON_HOSTS=ceph-mon1:6789,ceph-mon2:6789,ceph-mon3:6789
      - CEPH_DEFAULT_POOL=csfx-data
      - CEPH_PG_NUM=128
      - CEPH_DEFAULT_REPLICATION=3
      - PATRONI_SCOPE=postgres-csfxx
      - PATRONI_NODES=patroni1:8008,patroni2:8008,patroni3:8008
    networks:
      csfx-test:
        ipv4_address: 172.20.0.53
    depends_on:
      - etcd1
      - etcd2
      - etcd3
      - ceph-mon1
      - ceph-mon2
      - ceph-mon3
      - patroni1
      - patroni2
      - patroni3
    restart: unless-stopped

networks:
  csfx-test:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  # Ceph
  ceph-mon1-data:
  ceph-mon2-data:
  ceph-mon3-data:
  ceph-osd1-data:
  ceph-osd2-data:
  ceph-osd3-data:
  
  # etcd
  etcd1-data:
  etcd2-data:
  etcd3-data:
  
  # Patroni PostgreSQL
  patroni1-data:
  patroni2-data:
  patroni3-data:
