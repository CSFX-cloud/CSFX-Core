global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    retries 3
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

# ========================================
# Stats Interface
# ========================================
listen stats
    bind *:8000
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats admin if TRUE
    stats show-legends
    stats show-desc PostgreSQL HA Cluster with Patroni

# ========================================
# PostgreSQL Primary (WRITES)
# Port 5432 - Nur der Primary antwortet
# ========================================
listen postgres_primary
    bind *:5432
    mode tcp
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    
    # Patroni REST API Health Checks
    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008

# ========================================
# PostgreSQL Replicas (READS)
# Port 5433 - Nur Replicas antworten
# ========================================
listen postgres_replicas
    bind *:5433
    mode tcp
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2
    
    # Patroni REST API Health Checks
    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008

# ========================================
# PostgreSQL Any (Fallback für Legacy Apps)
# Port 5434 - Jede gesunde Node akzeptiert
# ========================================
listen postgres_any
    bind *:5434
    mode tcp
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    default-server inter 3s fall 3 rise 2
    
    server patroni1 patroni1:5432 check port 8008
    server patroni2 patroni2:5432 check port 8008
    server patroni3 patroni3:5432 check port 8008
