version: '3.8'

services:
  # ========================================
  # CEPH CLUSTER (3 MONs + 3 OSDs)
  # ========================================
  
  # Ceph Monitor 1
  ceph-mon1:
    image: ceph/daemon:latest-pacific
    container_name: ceph-mon1
    hostname: ceph-mon1
    environment:
      - CEPH_DAEMON=mon
      - MON_IP=172.20.0.21
      - CEPH_PUBLIC_NETWORK=172.20.0.0/16
      - CLUSTER=ceph
    volumes:
      - ceph-mon1-data:/var/lib/ceph
      - ceph-config:/etc/ceph
    networks:
      csf-test:
        ipv4_address: 172.20.0.21
    cap_add:
      - ALL
    privileged: true

  # Ceph Monitor 2
  ceph-mon2:
    image: ceph/daemon:latest-pacific
    container_name: ceph-mon2
    hostname: ceph-mon2
    environment:
      - CEPH_DAEMON=mon
      - MON_IP=172.20.0.22
      - CEPH_PUBLIC_NETWORK=172.20.0.0/16
      - CLUSTER=ceph
    volumes:
      - ceph-mon2-data:/var/lib/ceph
      - ceph-config:/etc/ceph
    networks:
      csf-test:
        ipv4_address: 172.20.0.22
    cap_add:
      - ALL
    privileged: true
    depends_on:
      - ceph-mon1

  # Ceph Monitor 3
  ceph-mon3:
    image: ceph/daemon:latest-pacific
    container_name: ceph-mon3
    hostname: ceph-mon3
    environment:
      - CEPH_DAEMON=mon
      - MON_IP=172.20.0.23
      - CEPH_PUBLIC_NETWORK=172.20.0.0/16
      - CLUSTER=ceph
    volumes:
      - ceph-mon3-data:/var/lib/ceph
      - ceph-config:/etc/ceph
    networks:
      csf-test:
        ipv4_address: 172.20.0.23
    cap_add:
      - ALL
    privileged: true
    depends_on:
      - ceph-mon1
      - ceph-mon2

  # Ceph OSD 1
  ceph-osd1:
    image: ceph/daemon:latest-pacific
    container_name: ceph-osd1
    hostname: ceph-osd1
    environment:
      - CEPH_DAEMON=osd
      - OSD_TYPE=directory
      - CEPH_PUBLIC_NETWORK=172.20.0.0/16
      - CLUSTER=ceph
    volumes:
      - ceph-osd1-data:/var/lib/ceph/osd
      - ceph-config:/etc/ceph
    networks:
      csf-test:
        ipv4_address: 172.20.0.31
    cap_add:
      - ALL
    privileged: true
    depends_on:
      - ceph-mon1
      - ceph-mon2
      - ceph-mon3

  # Ceph OSD 2
  ceph-osd2:
    image: ceph/daemon:latest-pacific
    container_name: ceph-osd2
    hostname: ceph-osd2
    environment:
      - CEPH_DAEMON=osd
      - OSD_TYPE=directory
      - CEPH_PUBLIC_NETWORK=172.20.0.0/16
      - CLUSTER=ceph
    volumes:
      - ceph-osd2-data:/var/lib/ceph/osd
      - ceph-config:/etc/ceph
    networks:
      csf-test:
        ipv4_address: 172.20.0.32
    cap_add:
      - ALL
    privileged: true
    depends_on:
      - ceph-mon1
      - ceph-mon2
      - ceph-mon3

  # Ceph OSD 3
  ceph-osd3:
    image: ceph/daemon:latest-pacific
    container_name: ceph-osd3
    hostname: ceph-osd3
    environment:
      - CEPH_DAEMON=osd
      - OSD_TYPE=directory
      - CEPH_PUBLIC_NETWORK=172.20.0.0/16
      - CLUSTER=ceph
    volumes:
      - ceph-osd3-data:/var/lib/ceph/osd
      - ceph-config:/etc/ceph
    networks:
      csf-test:
        ipv4_address: 172.20.0.33
    cap_add:
      - ALL
    privileged: true
    depends_on:
      - ceph-mon1
      - ceph-mon2
      - ceph-mon3

  # ========================================
  # ETCD CLUSTER (für State Management)
  # ========================================
  
  etcd1:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: etcd1
    environment:
      - ETCD_NAME=etcd1
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd1:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd1:2379
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster-test
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
    ports:
      - "2379:2379"
      - "2380:2380"
    networks:
      - csf-test

  etcd2:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: etcd2
    environment:
      - ETCD_NAME=etcd2
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd2:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd2:2379
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster-test
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
    ports:
      - "2479:2379"
      - "2480:2380"
    networks:
      - csf-test

  etcd3:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: etcd3
    environment:
      - ETCD_NAME=etcd3
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd3:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd3:2379
      - ETCD_INITIAL_CLUSTER_TOKEN=etcd-cluster-test
      - ETCD_INITIAL_CLUSTER=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
    ports:
      - "2579:2379"
      - "2580:2380"
    networks:
      - csf-test

  # ========================================
  # POSTGRESQL HA (3 Nodes mit Ceph RBD)
  # ========================================
  
  postgres1:
    image: postgres:16-alpine
    container_name: postgres1
    hostname: postgres1
    environment:
      - POSTGRES_USER=csf
      - POSTGRES_PASSWORD=csfpassword
      - POSTGRES_DB=csf_core
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres1-data:/var/lib/postgresql/data
    networks:
      csf-test:
        ipv4_address: 172.20.0.41
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csf -d csf_core"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - ceph-osd1
      - ceph-osd2
      - ceph-osd3

  postgres2:
    image: postgres:16-alpine
    container_name: postgres2
    hostname: postgres2
    environment:
      - POSTGRES_USER=csf
      - POSTGRES_PASSWORD=csfpassword
      - POSTGRES_DB=csf_core
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres2-data:/var/lib/postgresql/data
    networks:
      csf-test:
        ipv4_address: 172.20.0.42
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csf -d csf_core"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - ceph-osd1
      - ceph-osd2
      - ceph-osd3

  postgres3:
    image: postgres:16-alpine
    container_name: postgres3
    hostname: postgres3
    environment:
      - POSTGRES_USER=csf
      - POSTGRES_PASSWORD=csfpassword
      - POSTGRES_DB=csf_core
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres3-data:/var/lib/postgresql/data
    networks:
      csf-test:
        ipv4_address: 172.20.0.43
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csf -d csf_core"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - ceph-osd1
      - ceph-osd2
      - ceph-osd3

  # HAProxy für PostgreSQL Load Balancing
  postgres-haproxy:
    image: haproxy:2.8-alpine
    container_name: postgres-haproxy
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5432:5432"
      - "7000:7000"  # Stats
    networks:
      csf-test:
        ipv4_address: 172.20.0.40
    depends_on:
      - postgres1
      - postgres2
      - postgres3

  # ========================================
  # VOLUME MANAGER (3 Nodes mit Ceph Integration)
  # ========================================
  
  volume-manager-1:
    image: volume-manager:test
    build:
      context: ../..
      dockerfile: control-plane/volume-manager/Dockerfile.test
    container_name: volume-manager-1
    environment:
      - RUST_LOG=debug
      - ETCD_ENDPOINTS=http://etcd1:2379,http://etcd2:2379,http://etcd3:2379
      - NODE_ID=volume-manager-1
      - HOSTNAME=volume-manager-1
      - NODE_IP=172.20.0.11
      - CEPH_MON_HOSTS=ceph-mon1:6789,ceph-mon2:6789,ceph-mon3:6789
      - CEPH_CLIENT_NAME=admin
      - CEPH_DEFAULT_POOL=csf-volumes
      - CEPH_PG_NUM=128
      - CEPH_REPLICATION=3
    volumes:
      - ceph-config:/etc/ceph:ro
    depends_on:
      - etcd1
      - etcd2
      - etcd3
      - ceph-mon1
      - ceph-mon2
      - ceph-mon3
    networks:
      csf-test:
        ipv4_address: 172.20.0.11
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/rbd0
    restart: unless-stopped

  volume-manager-2:
    image: volume-manager:test
    build:
      context: ../..
      dockerfile: control-plane/volume-manager/Dockerfile.test
    container_name: volume-manager-2
    environment:
      - RUST_LOG=debug
      - ETCD_ENDPOINTS=http://etcd1:2379,http://etcd2:2379,http://etcd3:2379
      - NODE_ID=volume-manager-2
      - HOSTNAME=volume-manager-2
      - NODE_IP=172.20.0.12
      - CEPH_MON_HOSTS=ceph-mon1:6789,ceph-mon2:6789,ceph-mon3:6789
      - CEPH_CLIENT_NAME=admin
      - CEPH_DEFAULT_POOL=csf-volumes
      - CEPH_PG_NUM=128
      - CEPH_REPLICATION=3
    volumes:
      - ceph-config:/etc/ceph:ro
    depends_on:
      - etcd1
      - etcd2
      - etcd3
      - ceph-mon1
      - ceph-mon2
      - ceph-mon3
    networks:
      csf-test:
        ipv4_address: 172.20.0.12
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/rbd0
    restart: unless-stopped

  volume-manager-3:
    image: volume-manager:test
    build:
      context: ../..
      dockerfile: control-plane/volume-manager/Dockerfile.test
    container_name: volume-manager-3
    environment:
      - RUST_LOG=info
      - ETCD_ENDPOINTS=http://etcd1:2379,http://etcd2:2379,http://etcd3:2379
      - NODE_ID=volume-manager-3
      - HOSTNAME=volume-manager-3
      - NODE_IP=172.20.0.13
      - CEPH_MON_HOSTS=ceph-mon1:6789,ceph-mon2:6789,ceph-mon3:6789
      - CEPH_CLIENT_NAME=admin
      - CEPH_DEFAULT_POOL=csf-volumes
      - CEPH_PG_NUM=128
      - CEPH_REPLICATION=3
    volumes:
      - ceph-config:/etc/ceph:ro
    depends_on:
      - etcd1
      - etcd2
      - etcd3
      - ceph-mon1
      - ceph-mon2
      - ceph-mon3
    networks:
      csf-test:
        ipv4_address: 172.20.0.13
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/rbd0
    restart: unless-stopped

networks:
  csf-test:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  # Ceph Volumes
  ceph-mon1-data:
  ceph-mon2-data:
  ceph-mon3-data:
  ceph-osd1-data:
  ceph-osd2-data:
  ceph-osd3-data:
  ceph-config:
  
  # PostgreSQL Volumes (später durch Ceph RBD ersetzt)
  postgres1-data:
  postgres2-data:
  postgres3-data:
