# Docker Compose für Registry Development & Testing
version: '3.8'

services:
  registry:
    build:
      context: ../..
      dockerfile: control-plane/registry/Dockerfile.dev
    container_name: csf-registry
    ports:
      - "8001:8001"
    environment:
      - RUST_LOG=debug
      - REGISTRY_PORT=8001
    volumes:
      # Mount source code for hot reload with cargo-watch
      - ../../control-plane/registry/src:/app/control-plane/registry/src
      - ../../control-plane/shared:/app/control-plane/shared
    networks:
      - csf-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  csf-network:
    driver: bridge
