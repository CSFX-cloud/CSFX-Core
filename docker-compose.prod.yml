services:
  postgres:
    image: postgres:16-alpine
    container_name: csf-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-csf_core}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-csf_core}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - csf-internal
    restart: unless-stopped

  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.21
    container_name: csf-etcd
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd-data
    volumes:
      - etcd_data:/etcd-data
    networks:
      - csf-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd-init:
    image: gcr.io/etcd-development/etcd:v3.5.21
    container_name: csf-etcd-init
    environment:
      ETCDCTL_ENDPOINTS: http://etcd:2379
      ETCD_ROOT_PASSWORD: ${ETCD_ROOT_PASSWORD}
      ETCD_CSF_PASSWORD: ${ETCD_CSF_PASSWORD}
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - csf-internal
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if etcdctl user get root 2>/dev/null; then
          echo "etcd auth already configured"
          exit 0
        fi
        etcdctl user add root:$${ETCD_ROOT_PASSWORD}
        etcdctl user add csf:$${ETCD_CSF_PASSWORD}
        etcdctl role add csf-role
        etcdctl role grant-permission csf-role readwrite '/csf/' --prefix=true
        etcdctl user grant-role csf csf-role
        etcdctl auth enable
        echo "etcd auth configured"

  migrate:
    image: ghcr.io/${GHCR_ORG}/csf-ce-api-gateway:${CSF_VERSION:-latest}
    container_name: csf-migrate
    command: ["/csf-migrate"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-csf_core}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - csf-internal
    restart: "no"

  api-gateway:
    image: ghcr.io/${GHCR_ORG}/csf-ce-api-gateway:${CSF_VERSION:-latest}
    container_name: csf-api-gateway
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-csf_core}
      RUST_LOG: ${RUST_LOG:-info}
      JWT_SECRET: ${JWT_SECRET}
      RSA_KEY_SIZE: "4096"
      REGISTRY_SERVICE_URL: http://registry:8001
      SCHEDULER_SERVICE_URL: http://scheduler:8002
      VOLUME_MANAGER_URL: http://volume-manager:8003
      FAILOVER_CONTROLLER_URL: http://failover-controller:8004
      SDN_CONTROLLER_URL: http://sdn-controller:8005
      ETCD_ENDPOINTS: http://etcd:2379
      ETCD_USERNAME: csf
      ETCD_PASSWORD: ${ETCD_CSF_PASSWORD}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      etcd-init:
        condition: service_completed_successfully
    networks:
      - csf-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  registry:
    image: ghcr.io/${GHCR_ORG}/csf-ce-registry:${CSF_VERSION:-latest}
    container_name: csf-registry
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-csf_core}
      ETCD_ENDPOINTS: http://etcd:2379
      ETCD_USERNAME: csf
      ETCD_PASSWORD: ${ETCD_CSF_PASSWORD}
      REGISTRY_PORT: "8001"
      RUST_LOG: ${RUST_LOG:-info}
      SCHEDULER_SERVICE_URL: http://scheduler:8002
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      etcd-init:
        condition: service_completed_successfully
    networks:
      - csf-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  scheduler:
    image: ghcr.io/${GHCR_ORG}/csf-ce-scheduler:${CSF_VERSION:-latest}
    container_name: csf-scheduler
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-csf_core}
      ETCD_ENDPOINTS: http://etcd:2379
      ETCD_USERNAME: csf
      ETCD_PASSWORD: ${ETCD_CSF_PASSWORD}
      SCHEDULER_PORT: "8002"
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      etcd-init:
        condition: service_completed_successfully
    networks:
      - csf-internal
    restart: unless-stopped

  volume-manager:
    image: ghcr.io/${GHCR_ORG}/csf-ce-volume-manager:${CSF_VERSION:-latest}
    container_name: csf-volume-manager
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-csf_core}
      ETCD_ENDPOINTS: http://etcd:2379
      ETCD_USERNAME: csf
      ETCD_PASSWORD: ${ETCD_CSF_PASSWORD}
      VOLUME_MANAGER_PORT: "8003"
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      etcd-init:
        condition: service_completed_successfully
    networks:
      - csf-internal
    restart: unless-stopped

  failover-controller:
    image: ghcr.io/${GHCR_ORG}/csf-ce-failover-controller:${CSF_VERSION:-latest}
    container_name: csf-failover-controller
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-csf_core}
      FAILOVER_CONTROLLER_PORT: "8004"
      SCHEDULER_SERVICE_URL: http://scheduler:8002
      VOLUME_MANAGER_URL: http://volume-manager:8003
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      scheduler:
        condition: service_started
      volume-manager:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    networks:
      - csf-internal
    restart: unless-stopped

  sdn-controller:
    image: ghcr.io/${GHCR_ORG}/csf-ce-sdn-controller:${CSF_VERSION:-latest}
    container_name: csf-sdn-controller
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-csf_core}
      ETCD_URL: http://etcd:2379
      ETCD_USERNAME: csf
      ETCD_PASSWORD: ${ETCD_CSF_PASSWORD}
      SDN_CONTROLLER_PORT: "8005"
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      etcd-init:
        condition: service_completed_successfully
    networks:
      - csf-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  etcd_data:

networks:
  csf-internal:
    driver: bridge
