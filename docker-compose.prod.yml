services:
  postgres:
    image: postgres:16-alpine
    container_name: csfx-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-csfx_core}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-csfx_core}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - csfx-internal
    restart: unless-stopped

  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.21
    container_name: csfx-etcd
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd-data
    volumes:
      - etcd_data:/etcd-data
    networks:
      - csfx-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/${GHCR_ORG}/csfx-ce-api-gateway:${CSFX_VERSION:-latest}
    container_name: csfx-migrate
    command: ["/csfx-migrate"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-csfx_core}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - csfx-internal
    restart: "no"

  api-gateway:
    image: ghcr.io/${GHCR_ORG}/csfx-ce-api-gateway:${CSFX_VERSION:-latest}
    container_name: csfx-api-gateway
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-csfx_core}
      RUST_LOG: ${RUST_LOG:-info}
      JWT_SECRET: ${JWT_SECRET}
      RSA_KEY_SIZE: "4096"
      REGISTRY_SERVICE_URL: http://registry:8001
      SCHEDULER_SERVICE_URL: http://scheduler:8002
      VOLUME_MANAGER_URL: http://volume-manager:8003
      FAILOVER_CONTROLLER_URL: http://failover-controller:8004
      SDN_CONTROLLER_URL: http://sdn-controller:8005
      ETCD_ENDPOINTS: http://etcd:2379
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - csfx-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  registry:
    image: ghcr.io/${GHCR_ORG}/csfx-ce-registry:${CSFX_VERSION:-latest}
    container_name: csfx-registry
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-csfx_core}
      ETCD_ENDPOINTS: http://etcd:2379
      REGISTRY_PORT: "8001"
      RUST_LOG: ${RUST_LOG:-info}
      SCHEDULER_SERVICE_URL: http://scheduler:8002
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - csfx-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  scheduler:
    image: ghcr.io/${GHCR_ORG}/csfx-ce-scheduler:${CSFX_VERSION:-latest}
    container_name: csfx-scheduler
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-csfx_core}
      ETCD_ENDPOINTS: http://etcd:2379
      SCHEDULER_PORT: "8002"
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - csfx-internal
    restart: unless-stopped

  volume-manager:
    image: ghcr.io/${GHCR_ORG}/csfx-ce-volume-manager:${CSFX_VERSION:-latest}
    container_name: csfx-volume-manager
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-csfx_core}
      ETCD_ENDPOINTS: http://etcd:2379
      VOLUME_MANAGER_PORT: "8003"
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - csfx-internal
    restart: unless-stopped

  failover-controller:
    image: ghcr.io/${GHCR_ORG}/csfx-ce-failover-controller:${CSFX_VERSION:-latest}
    container_name: csfx-failover-controller
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-csfx_core}
      FAILOVER_CONTROLLER_PORT: "8004"
      SCHEDULER_SERVICE_URL: http://scheduler:8002
      VOLUME_MANAGER_URL: http://volume-manager:8003
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      scheduler:
        condition: service_started
      volume-manager:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    networks:
      - csfx-internal
    restart: unless-stopped

  sdn-controller:
    image: ghcr.io/${GHCR_ORG}/csfx-ce-sdn-controller:${CSFX_VERSION:-latest}
    container_name: csfx-sdn-controller
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-csfx_core}
      ETCD_URL: http://etcd:2379
      SDN_CONTROLLER_PORT: "8005"
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - csfx-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  etcd_data:

networks:
  csfx-internal:
    driver: bridge
