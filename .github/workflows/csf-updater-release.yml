name: csf-updater Release

on:
  workflow_run:
    workflows: ["Release Please"]
    types: [completed]
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  build:
    name: Build csf-updater (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          RUN_NUM="${{ github.run_number }}"
          if [ "${{ github.ref_name }}" = "develop" ] && [ "${{ github.event_name }}" != "workflow_run" ]; then
            echo "version=${VERSION}-alpha.${RUN_NUM}" >> $GITHUB_OUTPUT
          else
            TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "v${VERSION}")
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: csf-updater-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: |
          cargo build --release --bin csf-updater --target ${{ matrix.target }}
          cp target/${{ matrix.target }}/release/csf-updater csf-updater-${{ matrix.arch }}
          sha256sum csf-updater-${{ matrix.arch }} > csf-updater-${{ matrix.arch }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: csf-updater-${{ matrix.arch }}
          path: |
            csf-updater-${{ matrix.arch }}
            csf-updater-${{ matrix.arch }}.sha256
          retention-days: 7

  release:
    name: Attach to release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_run'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: csf-updater-*
          merge-multiple: true

      - name: Resolve tag
        id: tag
        run: |
          TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to release
        run: |
          gh release upload ${{ steps.tag.outputs.tag }} \
            csf-updater-amd64 \
            csf-updater-amd64.sha256 \
            csf-updater-arm64 \
            csf-updater-arm64.sha256 \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
