name: Docker Build & Push

on:
  workflow_run:
    workflows: ["Release Please"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 1.2.3)"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Prepare Build Context
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_build: ${{ steps.version.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            TAG=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
            if [ -z "$TAG" ]; then
              echo "should_build=false" >> $GITHUB_OUTPUT
            else
              echo "version=${TAG#v}" >> $GITHUB_OUTPUT
              echo "should_build=true" >> $GITHUB_OUTPUT
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build ${{ matrix.service }} (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - registry
          - scheduler
          - volume-manager
          - failover-controller
          - sdn-controller
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${REPO}-${{ matrix.service }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: control-plane/Dockerfile.prod.shared
          build-args: |
            SERVICE_BIN=${{ matrix.service }}
            BUILD_JOBS=2
          push: true
          outputs: type=registry,name=${{ steps.image.outputs.name }},push-by-digest=true
          platforms: ${{ matrix.platform }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.service }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-${{ matrix.arch }}

      - name: Save digest
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.service }}-${{ matrix.arch }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.service }}-${{ matrix.arch }}
          path: /tmp/digests/${{ matrix.service }}-${{ matrix.arch }}.txt
          retention-days: 1

  manifest:
    name: Manifest ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [prepare, build]
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - registry
          - scheduler
          - volume-manager
          - failover-controller
          - sdn-controller
    steps:
      - name: Set image name
        id: image
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${REPO}-${{ matrix.service }}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          pattern: digest-${{ matrix.service }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          IMAGE="${{ steps.image.outputs.name }}"
          AMD64=$(cat /tmp/digests/${{ matrix.service }}-amd64.txt)
          ARM64=$(cat /tmp/digests/${{ matrix.service }}-arm64.txt)

          docker buildx imagetools create \
            -t ${IMAGE}:${VERSION} \
            -t ${IMAGE}:latest \
            ${IMAGE}@${AMD64} \
            ${IMAGE}@${ARM64}

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [prepare, manifest]
    if: always()
    steps:
      - name: Write summary
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "## Docker Build — v${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          for svc in api-gateway registry scheduler volume-manager failover-controller sdn-controller; do
            echo "| ${svc} | \`ghcr.io/${REPO}-${svc}:${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          done
