services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: csf-postgres-registry
    environment:
      POSTGRES_USER: csf_user
      POSTGRES_PASSWORD: csf_password
      POSTGRES_DB: csf_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csf_user -d csf_core"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - csf-network

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: control-plane/api-gateway/Dockerfile.dev
    container_name: csf-api-gateway-registry
    environment:
      DATABASE_URL: postgres://csf_user:csf_password@postgres:5432/csf_core
      RUST_LOG: debug
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RSA_KEY_SIZE: "2048"
      REGISTRY_SERVICE_URL: http://registry:8001
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./control-plane/api-gateway:/app/control-plane/api-gateway
      - ./control-plane/shared:/app/control-plane/shared
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo_cache:/usr/local/cargo/registry
      - cargo_target_api_gateway:/app/target
    networks:
      - csf-network
    command: cargo watch -x "run --bin api-gateway"
    restart: unless-stopped

  # Registry Service
  registry:
    build:
      context: .
      dockerfile: control-plane/registry/Dockerfile.dev
    container_name: csf-registry-service
    environment:
      DATABASE_URL: postgres://csf_user:csf_password@postgres:5432/csf_core
      RUST_LOG: debug
      REGISTRY_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      api-gateway:
        condition: service_started
    volumes:
      - ./control-plane/registry:/app/control-plane/registry
      - ./control-plane/shared:/app/control-plane/shared
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo_cache:/usr/local/cargo/registry
      - cargo_target_registry:/app/target
    networks:
      - csf-network
    command: cargo watch -x "run --bin registry"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
    driver: local
  cargo_cache:
    driver: local
  cargo_target_api_gateway:
    driver: local
  cargo_target_registry:
    driver: local

networks:
  csf-network:
    driver: bridge
