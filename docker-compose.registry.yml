x-rust-common: &rust-common
  build:
    context: .
    dockerfile: control-plane/Dockerfile.dev.shared
    cache_from:
      - type=registry,ref=csfx-core-rust-base:latest
  volumes:
    - ./control-plane/shared:/app/control-plane/shared
    - ./Cargo.toml:/app/Cargo.toml
    - ./Cargo.lock:/app/Cargo.lock
    - cargo_cache:/usr/local/cargo/registry
    - cargo_git:/usr/local/cargo/git
  networks:
    - csfx-network
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    container_name: csfx-postgres-registry
    environment:
      POSTGRES_USER: csfx_user
      POSTGRES_PASSWORD: csfx_password
      POSTGRES_DB: csfx_core
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csfx_user -d csfx_core"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - csfx-network

  api-gateway:
    <<: *rust-common
    container_name: csfx-api-gateway-registry
    environment:
      DATABASE_URL: postgres://csfx_user:csfx_password@postgres:5432/csfx_core
      RUST_LOG: debug
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      RSA_KEY_SIZE: "2048"
      REGISTRY_SERVICE_URL: http://registry:8001
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./control-plane/api-gateway:/app/control-plane/api-gateway
      - ./control-plane/shared:/app/control-plane/shared
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo_cache:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - cargo_target_api_gateway:/app/target
    command: cargo watch -x "run -p api-gateway"

  registry:
    <<: *rust-common
    container_name: csfx-registry-service
    environment:
      DATABASE_URL: postgres://csfx_user:csfx_password@postgres:5432/csfx_core
      RUST_LOG: debug
      REGISTRY_PORT: 8001
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      api-gateway:
        condition: service_started
    volumes:
      - ./control-plane/registry:/app/control-plane/registry
      - ./control-plane/shared:/app/control-plane/shared
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo_cache:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - cargo_target_registry:/app/target
    command: cargo watch -x "run -p registry"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent:
    <<: *rust-common
    container_name: csfx-agent-test
    environment:
      CSFX_GATEWAY_URL: http://api-gateway:8000
      CSFX_REGISTRATION_TOKEN: ${CSFX_REGISTRATION_TOKEN}
      CSFX_HEARTBEAT_INTERVAL: "30"
      RUST_LOG: debug
    depends_on:
      registry:
        condition: service_healthy
    volumes:
      - ./agent:/app/agent
      - ./control-plane/shared:/app/control-plane/shared
      - ./Cargo.toml:/app/Cargo.toml
      - ./Cargo.lock:/app/Cargo.lock
      - cargo_cache:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - cargo_target_agent:/app/target
      - agent_state:/var/lib/csfxx-daemon
    command: cargo run -p csfx-agent
    restart: "no"

volumes:
  postgres_data:
    driver: local
  cargo_cache:
    driver: local
  cargo_git:
    driver: local
  cargo_target_api_gateway:
    driver: local
  cargo_target_registry:
    driver: local
  cargo_target_agent:
    driver: local
  agent_state:
    driver: local

networks:
  csfx-network:
    driver: bridge
